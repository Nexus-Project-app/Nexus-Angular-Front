<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Projet</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Force color scheme early -->
  <meta name="color-scheme" content="light dark">

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- THEME INIT BEFORE RENDER -->
  <script>
    (function () {
      try {
        const stored = localStorage.getItem('nexus-theme');
        const dark = stored === null ? true : stored === 'dark';

        if (dark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    })();
  </script>

  <!-- PRELOADER STYLE (THEME AWARE) -->
  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      background: #ffffff;
    }

    html.dark body {
      background: #0b0f19;
    }

    #app-preloader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;

      background: #ffffff;
      transition: background 0.3s ease;
      font-family: system-ui, sans-serif;
    }

    html.dark #app-preloader {
      background: #0b0f19;
    }

    .preloader-content {
      text-align: center;
    }

    .preloader-content h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #111827;
      transition: color 0.3s ease;
    }

    html.dark .preloader-content h1 {
      color: #f9fafb;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid rgba(156, 163, 175, 0.3);
      border-top: 2px solid #2563eb;
      animation: spin 0.8s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- PRELOADER -->
  <div id="app-preloader">
    <div class="preloader-content">
      <h1>Nexus</h1>
      <div class="spinner"></div>
    </div>
  </div>

  <app-root></app-root>
</body>
</html>
