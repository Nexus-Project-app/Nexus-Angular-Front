<div class="nexus-editor-page">
  <app-navbar />

  <!-- Barre supérieure -->
  <header class="nexus-editor-header">
    <button
      type="button"
      class="nexus-editor-back-btn"
      (click)="onBackClick()"
      aria-label="Retour au fil"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="nexus-editor-header-left">
      <input
        type="text"
        class="nexus-editor-title-input"
        [value]="titleText()"
        (input)="onTitleChange($event)"
        placeholder="Titre du document"
        aria-label="Titre du document"
      />
    </div>

    <div class="nexus-editor-header-right">
      @if (isEditorReady()) {
        <span class="nexus-editor-meta">
          {{ wordCount() }} mot{{ wordCount() > 1 ? 's' : '' }}
        </span>
      }

      <!-- Bouton bascule panneau Markdown -->
      <button
        type="button"
        class="nexus-editor-toggle-btn"
        [class.active]="isMarkdownPanelOpen()"
        (click)="toggleMarkdownPanel()"
        [attr.aria-label]="isMarkdownPanelOpen() ? 'Masquer le Markdown' : 'Afficher le Markdown'"
        [attr.aria-expanded]="isMarkdownPanelOpen()"
        aria-controls="markdown-panel"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
        <span>Markdown</span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="nexus-editor-chevron"
          aria-hidden="true"
        >
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <button
        type="button"
        class="nexus-editor-save-btn"
        [class.saved]="isSaved()"
        (click)="onSave()"
        [attr.aria-label]="isSaved() ? 'Document sauvegardé' : 'Sauvegarder le document'"
      >
        @if (isSaved()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>Sauvegardé</span>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          <span>Sauvegarder</span>
        }
      </button>
    </div>
  </header>

  <!-- Zone principale : éditeur + panneau markdown -->
  <div class="nexus-editor-workspace" [class.panel-open]="isMarkdownPanelOpen()">

    <!-- Éditeur WYSIWYG -->
    <main class="nexus-editor-body" (click)="focusEditor()" (keydown)="onEditorKeydown($event)">
      @if (!isEditorReady()) {
        <output class="nexus-editor-loading" aria-label="Chargement de l'éditeur">
          <div class="nexus-editor-loading-spinner"></div>
          <span>Chargement de l'éditeur…</span>
        </output>
      }
      <div #editorRoot class="nexus-editor-root" [class.ready]="isEditorReady()"></div>
    </main>

    <!-- Panneau Markdown source -->
    <aside
      id="markdown-panel"
      class="nexus-markdown-panel"
      [class.open]="isMarkdownPanelOpen()"
      [attr.aria-hidden]="!isMarkdownPanelOpen()"
    >
      <div class="nexus-markdown-panel-header">
        <span>Source Markdown</span>
        <button
          type="button"
          class="nexus-markdown-panel-close"
          (click)="toggleMarkdownPanel()"
          aria-label="Fermer le panneau Markdown"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <textarea
        class="nexus-markdown-source"
        [value]="markdownSource()"
        (focus)="onSourceFocus()"
        (blur)="onSourceBlur()"
        (input)="onSourceInput($event)"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        aria-label="Source Markdown éditable"
      ></textarea>
    </aside>

  </div>

</div>

@if (isLeaveModalOpen()) {
  <dialog
    class="nexus-editor-modal-overlay"
    aria-labelledby="leave-modal-title"
    open
    (click)="cancelLeave()"
    (keydown.escape)="cancelLeave()"
  >
    <div class="nexus-editor-modal" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
      <h2 id="leave-modal-title" class="nexus-editor-modal-title">Quitter sans sauvegarder ?</h2>
      <p class="nexus-editor-modal-body">Vos modifications seront perdues définitivement.</p>
      <div class="nexus-editor-modal-actions">
        <button type="button" class="nexus-editor-modal-cancel" (click)="cancelLeave()">
          Annuler
        </button>
        <button type="button" class="nexus-editor-modal-confirm" (click)="confirmLeave()">
          Quitter
        </button>
      </div>
    </div>
  </dialog>
}
