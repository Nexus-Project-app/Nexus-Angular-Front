<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">


<!-- Header -->
<div class="text-center mb-8">
  <h1 class="text-3xl font-bold text-gray-900">Nexus 

     


  </h1>
  <p class="mt-2 text-sm text-gray-500">Bienvenue sur votre espace</p>
</div>

<!-- Card -->
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">

  <!-- Success icon -->
  <div class="flex justify-center mb-5">
    <div class="h-16 w-16 flex items-center justify-center rounded-full bg-green-100">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
    </div>
  </div>

  <!-- Message -->
  <h2 class="text-xl font-semibold text-gray-900 mb-2">
    @if (!notConnected()) {
        Vous êtes connecté 
        <span class="text-sm text-gray-500"> - (En tant qu'invité)</span>   
     }
     @else{
        Vous êtes bien connecté - {{ getUserRole() }}
     }
  </h2>
  <p class="text-sm text-gray-500 mb-6">
    Votre authentification a réussi. Vous pouvez maintenant accéder à la plateforme.
  </p>

  <!-- Actions -->
  <div class="flex flex-col gap-3">

    

    <button
      class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm rounded-lg transition
             focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
      (click)="goToDashboard()"
    >
      Accéder au dashboard
    </button>


    @if (notConnected()) {
       <button
            class="w-full py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium text-sm rounded-lg transition"
            (click)="logout()"
            >
            Se déconnecter
        </button> 
     }

    

    @if (!notConnected()) {
        <button
            class="w-full py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium text-sm rounded-lg transition"
            (click)="login()"
            >
            Se connecter
        </button>  
     }
    
     <div class="flex flex-col gap-3">
        <!-- Google SSO -->
        <!-- <button
            class="w-full py-2.5 px-4 bg-white border hover:bg-gray-50 text-gray-700 font-medium text-sm rounded-lg flex items-center justify-center gap-2"
            (click)="loginMicrosoft()"
        >
            🔵 Continuer avec Microsoft
        </button> -->

        <!-- GitHub SSO -->
        <button
            class="w-full py-2.5 px-4 bg-gray-900 hover:bg-gray-800 text-white font-medium text-sm rounded-lg flex items-center justify-center gap-2"
            (click)="loginGithub()"
        >
            🐙 Continuer avec GitHub
        </button>

    </div>

  </div>

    <!-- <div>
        {{ getUserInfo() }}
    </div> -->
</div>


  </div>
</div>
