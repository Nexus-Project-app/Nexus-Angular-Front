<div class="min-h-screen bg-nexus-bg flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <!-- Brand -->
    <div class="text-center mb-10">
      <span class="text-4xl font-bold tracking-tight text-nexus-accent">Nexus</span>
      <p class="mt-3 text-sm text-nexus-muted">Connectez-vous à votre compte</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <div>

        @if (serverError()) {
          <div
            class="mb-6 px-4 py-3 rounded-xl text-sm text-red-400 bg-red-500/10 border border-red-500/20"
            role="alert"
            aria-live="assertive"
          >
            {{ serverError() }}
            
          </div>
        }


        <!-- Submit -->
        <button
          [disabled]="loading()"
          (click)="login()"
          class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed
                 text-white font-medium text-sm rounded-lg transition
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
        >
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <svg
                class="animate-spin h-4 w-4"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 22 6.477 22 12h-4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
              </svg>
              Connexion en cours…
            </span>
          } @else {
            Se connecter
          }
        </button>

      </div>
    </div>
  </div>
</div>
