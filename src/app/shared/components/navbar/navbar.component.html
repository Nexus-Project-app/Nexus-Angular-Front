<header class="top-header" aria-label="Barre supérieure">
  <a class="brand" href="#" (click)="navigateHome($event)">
    @if (themeService.isDark()) {
      <img ngSrc="/nexus.svg" alt="Nexus" width="255" height="102" priority />
    } @else {
      <img ngSrc="/nexus_black.svg" alt="Nexus" width="255" height="102" priority />
    }
  </a>
  <div class="header-actions" aria-label="Actions utilisateur">
    <button class="icon-button" type="button" aria-label="Rechercher" title="Rechercher" (click)="openSearch()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1010.5 18a7.5 7.5 0 006.15-3.15z"
        />
      </svg>
    </button>
    <button
      class="icon-button"
      type="button"
      [attr.aria-label]="themeService.isDark() ? 'Passer en mode clair' : 'Passer en mode sombre'"
      (click)="themeService.toggle()"
      title="Changer le thème"
    >
      @if (themeService.isDark()) {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l.707.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"
          />
        </svg>
      } @else {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"
          />
        </svg>
      }
    </button>

    @if (isConnected) {
      <button class="user-meta" type="button" (click)="navigateProfile($event)">
        <div class="avatar" aria-hidden="true">{{ userInitial() }}</div>
        <div>
          <p class="flex">{{ user().name }} - {{ user().role }}</p>
          <p class="user-role">{{ user().email }}</p>
        </div>
      </button>
      <button class="icon-button" type="button" aria-label="Se déconnecter" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    }

    @if (!isConnected) {
      <button class="icon-button" type="button" aria-label="Se connecter" (click)="login()">
        <i class="fas fa-user"></i>
      </button>
    }
  </div>
</header>

<app-search-modal [open]="searchOpen()" (closed)="closeSearch()" />
