name: CI CD frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  build-and-test:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarCloud analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install 2>&1 | tee npm-install.log

      - name: Build application
        run: npm run build 2>&1 | tee build.log

      - name: Upload build artifact and logs
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: |
            dist/projet
            npm-install.log
            build.log

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Placeholder
        run: echo "Docker job disabled until self-hosted runner is available"